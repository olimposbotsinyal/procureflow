name: Deploy Web To Plesk Branch

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Publish dist to deploy-web branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy-web
          folder: web/dist
          clean: true
          single-commit: true
