# .github/workflows/plesk-deploy.yml
# GitHub Actions ile otomatik Plesk deploy pipeline’ı

name: Plesk Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Checkout Et
        uses: actions/checkout@v3
      - name: SSH ile Plesk’e Deploy Et
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 213.238.191.177
          username: admin
          password: ${{ secrets.96578097Run!! }}
          port: 22
          script: |
            cd /var/www/vhosts/buyerassistans.com.tr/httpdocs
            rsync -av --exclude='.venv' --exclude='node_modules' --exclude='.git' $GITHUB_WORKSPACE/ .
            if [ -f "requirements.txt" ]; then
              source /var/www/vhosts/buyerassistans.com.tr/venv/bin/activate
              pip install -r requirements.txt
            fi
            if [ -f "web/package.json" ]; then
              cd web
              npm install
              npm run build
              cd ..
            fi
            if [ -f "api/alembic.ini" ]; then
              source /var/www/vhosts/buyerassistans.com.tr/venv/bin/activate
              cd api
              alembic upgrade head
              cd ..
            fi
            # systemctl restart myapp.service
