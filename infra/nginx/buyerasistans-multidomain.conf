# BUYER ASISTANS multi-domain production config
# Replace ssl cert/key and upstream targets before deploy

upstream buyer_web {
    server 127.0.0.1:5175;
}

upstream buyer_api {
    server 127.0.0.1:8000;
}

map $host $canonical_host {
    default buyerasistans.com.tr;
    buyerasistans.com.tr buyerasistans.com.tr;
    www.buyerasistans.com.tr buyerasistans.com.tr;
    buyerasistans.com buyerasistans.com;
    www.buyerasistans.com buyerasistans.com;
    buyerasistans.online buyerasistans.online;
    www.buyerasistans.online buyerasistans.online;
    buyerasistans.info buyerasistans.info;
    www.buyerasistans.info buyerasistans.info;
}

server {
    listen 80;
    server_name buyerasistans.com.tr www.buyerasistans.com.tr buyerasistans.com www.buyerasistans.com buyerasistans.online www.buyerasistans.online buyerasistans.info www.buyerasistans.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buyerasistans.com.tr www.buyerasistans.com.tr buyerasistans.com www.buyerasistans.com buyerasistans.online www.buyerasistans.online buyerasistans.info www.buyerasistans.info;

    ssl_certificate     /etc/letsencrypt/live/buyerasistans/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buyerasistans/privkey.pem;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API proxy
    location /api/ {
        proxy_pass http://buyer_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Domain intent routing
    location ~* ^/(blog|rehber|sozluk|kaynaklar) {
        if ($host != "buyerasistans.info") {
            return 301 https://buyerasistans.info$request_uri;
        }
        proxy_pass http://buyer_web;
    }

    location ~* ^/(kampanya|landing|lp|promo) {
        if ($host != "buyerasistans.online") {
            return 301 https://buyerasistans.online$request_uri;
        }
        proxy_pass http://buyer_web;
    }

    # Sitemap endpoints by domain intent
    location = /sitemap.xml {
        if ($host = "buyerasistans.com.tr") { return 301 https://buyerasistans.com.tr/sitemap-main.xml; }
        if ($host = "buyerasistans.com") { return 301 https://buyerasistans.com/sitemap-global.xml; }
        if ($host = "buyerasistans.online") { return 301 https://buyerasistans.online/sitemap-campaigns.xml; }
        if ($host = "buyerasistans.info") { return 301 https://buyerasistans.info/sitemap-knowledge.xml; }
        return 301 https://buyerasistans.com.tr/sitemap-main.xml;
    }

    # App fallback
    location / {
        proxy_pass http://buyer_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
